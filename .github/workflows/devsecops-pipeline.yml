# =============================================================================
# DevSecOps Pipeline — Complete Pipeline (Phase 1 + Phase 2)
# Project: Automated SDLC Security Scanner
# Maps to: All SRQs (SRQ-001 through SRQ-010)
#
# SAST + Secrets Detection
# SCA + Container Scan + Policy Gate
#
# Job execution order:
#   sast ──────────────────────────────────────┐
#   secrets-detection ─────────────────────────┤
#   sca ───────────────────────────────────────┤──► policy-gate
#   container-scan ────────────────────────────┘
#
# SAST, secrets, SCA, and container scan all run in parallel.
# Policy gate waits for all four to complete before evaluating.
# =============================================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least-privilege token scope — SRQ-005 / STRIDE P-E-001
permissions:
  contents: read

# Cancel in-progress runs on the same branch — mitigates P-D-001
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: SAST — Semgrep + Bandit
  # ---------------------------------------------------------------------------
  sast:
    name: "SAST — Semgrep + Bandit"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        # v5.3.0
        with:
          python-version: "3.10"

      - name: Install SAST dependencies
        run: pip install semgrep bandit pyyaml

      - name: Run Semgrep (custom rules)
        run: |
          mkdir -p outputs
          semgrep \
            --config pipeline/sast/semgrep-rules.yml \
            --json \
            --output outputs/semgrep-custom-raw.json \
            app/
        continue-on-error: true

      - name: Run Semgrep (OWASP ruleset)
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --json \
            --output outputs/semgrep-owasp-raw.json \
            app/
        continue-on-error: true

      - name: Run Bandit
        run: |
          bandit \
            -c pipeline/sast/bandit-config.yaml \
            -r app/ \
            -f json \
            -o outputs/bandit-raw.json
        continue-on-error: true

      - name: Normalize SAST outputs
        run: |
          python3 pipeline/sast/normalize.py \
            --semgrep outputs/semgrep-custom-raw.json \
            --bandit  outputs/bandit-raw.json \
            --output  outputs/sast-normalized.json

      - name: Upload SAST artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        # v4.6.0
        if: always()
        with:
          name: sast-results
          path: |
            outputs/semgrep-custom-raw.json
            outputs/semgrep-owasp-raw.json
            outputs/bandit-raw.json
            outputs/sast-normalized.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Secrets Detection — Trufflehog
  # ---------------------------------------------------------------------------
  secrets-detection:
    name: "Secrets — Trufflehog"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Install Trufflehog
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      - name: Run Trufflehog (full git history)
        run: |
          mkdir -p outputs
          trufflehog git file://. \
            --no-update \
            --config pipeline/secrets/trufflehog-config.yml \
            --results=verified,unknown \
            --json \
            > outputs/trufflehog-raw.json 2>&1 || true

      - name: Upload secrets artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: secrets-results
          path: outputs/trufflehog-raw.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: SCA — OWASP Dependency-Check
  # Maps to: SRQ-010, OWASP A06:2021
  #
  # Runs via Docker — avoids Java version management on the runner.
  # NVD API key stored as GitHub Secret (never hardcoded — SRQ-008).
  # --noupdate would skip the NVD download but requires a cached DB.
  # First run downloads the full NVD database (~5 min with API key).
  # ---------------------------------------------------------------------------
  sca:
    name: "SCA — OWASP Dependency-Check"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.10"

      - name: Install SCA normalizer dependencies
        run: pip install pyyaml

      - name: Create output directories
        run: mkdir -p outputs/dc-report

      - name: Run OWASP Dependency-Check
        run: |
          docker run --rm \
            -u $(id -u):$(id -g) \
            --volume ${{ github.workspace }}:/src:z \
            --volume ${{ github.workspace }}/outputs/dc-report:/report:z \
            owasp/dependency-check:latest \
            --scan /src/app/requirements.txt \
            --format JSON \
            --project "devsecops-pipeline" \
            --out /report \
            --nvdApiKey ${{ secrets.NVD_API_KEY }} \
            --disableAssembly \
            --disableNodeJS \
            --disableYarnAudit \
            --disableNodeAudit
        continue-on-error: true

      - name: Normalize SCA output
        run: |
          python3 pipeline/sca/normalize-sca.py \
            --input  outputs/dc-report/dependency-check-report.json \
            --output outputs/sca-normalized.json
        continue-on-error: true

      - name: Upload SCA artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: sca-results
          path: |
            outputs/dc-report/dependency-check-report.json
            outputs/sca-normalized.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 4: Container Scan — Docker Build + Trivy
  # Maps to: SRQ-009 (non-root execution), SRQ-010 (CVE threshold)
  #
  # Step 1: Build the Docker image from the repo Dockerfile
  # Step 2: Run Trivy against the built image (vuln + misconfig scanners)
  # Step 3: Normalize Trivy output to unified schema
  # ---------------------------------------------------------------------------
  container-scan:
    name: "Container — Build + Trivy"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.10"

      - name: Install container scan normalizer dependencies
        run: pip install pyyaml

      - name: Build Docker image
        run: |
          docker build -t devsecops-app:${{ github.sha }} .
          docker tag devsecops-app:${{ github.sha }} devsecops-app:latest

      - name: Run Trivy image scan
        run: |
          mkdir -p outputs
          trivy image \
            --format json \
            --output outputs/trivy-raw.json \
            --scanners vuln,misconfig \
            --timeout 10m \
            devsecops-app:latest
        continue-on-error: true

      - name: Normalize Trivy output
        run: |
          python3 pipeline/container/normalize-trivy.py \
            --input  outputs/trivy-raw.json \
            --output outputs/trivy-normalized.json
        continue-on-error: true

      - name: Upload container scan artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: container-results
          path: |
            outputs/trivy-raw.json
            outputs/trivy-normalized.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 5: Policy Gate — Aggregate + Enforce
  # Maps to: SRQ-010, SRQ-002
  #
  # Waits for ALL prior jobs to complete (needs: [...]).
  # Downloads all normalized artifacts from prior jobs.
  # Runs evaluate.py against policy.yml thresholds.
  # continue-on-error: false — exit code 1 BLOCKS the pipeline.
  # This is the enforcement mechanism — not just a reporting step.
  # ---------------------------------------------------------------------------
  policy-gate:
    name: "Policy Gate — Enforce"
    runs-on: ubuntu-latest
    needs: [sast, secrets-detection, sca, container-scan]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.10"

      - name: Install policy gate dependencies
        run: pip install pyyaml

      - name: Download SAST results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        # v4.1.8
        with:
          name: sast-results
          path: outputs/
        continue-on-error: true

      - name: Download SCA results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: sca-results
          path: outputs/
        continue-on-error: true

      - name: Download container scan results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: container-results
          path: outputs/
        continue-on-error: true

      - name: List available outputs
        run: ls -la outputs/ || echo "No outputs directory"

      # SRQ-002: Verify policy.yml has not been tampered with
      # Expected hash is stored as a GitHub Secret set during initial setup
      - name: Run policy gate
        run: |
          python3 pipeline/policy/evaluate.py \
            --policy pipeline/policy/policy.yml \
            --output outputs/policy-report.json \
            --expected-hash ${{ secrets.POLICY_YML_HASH }}
        continue-on-error: false

      - name: Upload policy report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: policy-report
          path: outputs/policy-report.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 6: DAST — OWASP ZAP
  # Maps to: SRQ-011 (DAST Active Scan Coverage)
  # ---------------------------------------------------------------------------
  dast:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    needs: [policy-gate]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.10"

      - name: Install DAST dependencies
        run: pip install requests pyyaml

      - name: Pull ZAP image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      - name: Start Flask app via Docker Compose
        run: |
          docker compose up -d flask-app
          echo "Waiting for Flask app to be ready..."
          for i in $(seq 1 18); do
            if curl -sf http://localhost:5050/ > /dev/null 2>&1; then
              echo "Flask app is ready after ${i} attempts."
              break
            fi
            echo "Attempt $i: app not ready yet, waiting 5s..."
            sleep 5
          done
          curl -sf http://localhost:5050/ || (echo "ERROR: Flask app not reachable" && docker compose logs flask-app && exit 1)

      - name: Run ZAP scan
        run: |
          mkdir -p outputs
          FULL_SCAN_FLAG=""
          if [ "${{ vars.ZAP_FULL_SCAN }}" = "true" ]; then
            FULL_SCAN_FLAG="--full-scan"
            echo "Full scan mode enabled."
          else
            echo "Baseline mode."
          fi
          python3 Pipeline/Dast/zap-scan.py --target http://localhost:5050 $FULL_SCAN_FLAG
        continue-on-error: true

      - name: Stop Flask app
        if: always()
        run: docker compose down

      - name: Upload DAST artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: dast-results
          path: |
            outputs/zap-baseline-raw.json
            outputs/zap-raw.json
            outputs/zap-normalized.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 7: Report Generator — Security Assessment PDF
  # Maps to: D3 deliverable
  # ---------------------------------------------------------------------------
  report:
    name: "Report — Security Assessment PDF"
    runs-on: ubuntu-latest
    needs: [sast, secrets-detection, sca, container-scan, policy-gate, dast]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.10"

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libpangocairo-1.0-0 \
            libcairo2 \
            libcairo-gobject2 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fontconfig

      - name: Install Python dependencies
        run: pip install weasyprint jinja2 pyyaml

      - name: Create outputs directory
        run: mkdir -p outputs

      - name: Download SAST results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: sast-results
          path: outputs/
        continue-on-error: true

      - name: Download secrets results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: secrets-results
          path: outputs/
        continue-on-error: true

      - name: Download SCA results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: sca-results
          path: outputs/
        continue-on-error: true

      - name: Download container scan results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: container-results
          path: outputs/
        continue-on-error: true

      - name: Download DAST results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: dast-results
          path: outputs/
        continue-on-error: true

      - name: Download policy report
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: policy-report
          path: outputs/
        continue-on-error: true

      - name: List available outputs
        run: ls -la outputs/

      - name: Generate security report
        run: |
          python3 Reporting/generate-report.py \
            --run-label "Pipeline Run — ${{ github.sha }}" \
            --output-dir outputs/
        continue-on-error: true

      - name: Upload security report
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: security-report
          path: |
            outputs/security-report.html
            outputs/security-report.pdf
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 6: DAST — OWASP ZAP
  # Maps to: SRQ-011 (DAST Active Scan Coverage)
  # ---------------------------------------------------------------------------
  dast:
    name: "DAST — OWASP ZAP"
    runs-on: ubuntu-latest
    needs: [policy-gate]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.10"

      - name: Install DAST dependencies
        run: pip install requests pyyaml

      - name: Pull ZAP image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      - name: Start Flask app via Docker Compose
        run: |
          docker compose up -d flask-app
          echo "Waiting for Flask app to be ready..."
          for i in $(seq 1 18); do
            if curl -sf http://localhost:5050/ > /dev/null 2>&1; then
              echo "Flask app is ready after ${i} attempts."
              break
            fi
            echo "Attempt $i: app not ready yet, waiting 5s..."
            sleep 5
          done
          curl -sf http://localhost:5050/ || (echo "ERROR: Flask app not reachable" && docker compose logs flask-app && exit 1)

      - name: Run ZAP scan
        run: |
          mkdir -p outputs
          FULL_SCAN_FLAG=""
          if [ "${{ vars.ZAP_FULL_SCAN }}" = "true" ]; then
            FULL_SCAN_FLAG="--full-scan"
            echo "Full scan mode enabled."
          else
            echo "Baseline mode."
          fi
          python3 Pipeline/Dast/zap-scan.py --target http://localhost:5050 $FULL_SCAN_FLAG
        continue-on-error: true

      - name: Stop Flask app
        if: always()
        run: docker compose down

      - name: Upload DAST artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: dast-results
          path: |
            outputs/zap-baseline-raw.json
            outputs/zap-raw.json
            outputs/zap-normalized.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 7: Report Generator — Security Assessment PDF
  # Maps to: D3 deliverable
  # ---------------------------------------------------------------------------
  report:
    name: "Report — Security Assessment PDF"
    runs-on: ubuntu-latest
    needs: [sast, secrets-detection, sca, container-scan, policy-gate, dast]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: "3.10"

      - name: Install WeasyPrint system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libpangocairo-1.0-0 \
            libcairo2 \
            libcairo-gobject2 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info \
            fontconfig

      - name: Install Python dependencies
        run: pip install weasyprint jinja2 pyyaml

      - name: Create outputs directory
        run: mkdir -p outputs

      - name: Download SAST results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: sast-results
          path: outputs/
        continue-on-error: true

      - name: Download secrets results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: secrets-results
          path: outputs/
        continue-on-error: true

      - name: Download SCA results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: sca-results
          path: outputs/
        continue-on-error: true

      - name: Download container scan results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: container-results
          path: outputs/
        continue-on-error: true

      - name: Download DAST results
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
          name: dast-results
          path: outputs/
        continue-on-error: true

      - name: Download policy report
        uses: actions/download-artifact@95815c38cf2ff2164869cbab79da8d1f6e0b8b9
        with:
