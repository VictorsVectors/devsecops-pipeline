# =============================================================================
# DevSecOps Pipeline — Phase 1: SAST + Secrets Detection
# Project: Automated SDLC Security Scanner
# Maps to: SRQ-004, SRQ-006, SRQ-007, SRQ-008 (D1 Security Requirements)
#
# Pipeline stage order rationale (documented for Design Report Section 13):
# 1. SAST runs before SCA because source code flaws are cheaper to fix early
#    and don't require building the container. Fast feedback loop.
# 2. Secrets detection runs alongside SAST — both are static, pre-build checks.
# 3. SCA + Container scanning run after build (Phase 2, Step 17).
# 4. DAST runs last — requires a running container (Step 19).
# 5. Policy gate aggregates all findings and blocks deployment (Step 16).
#
# Supply chain security (SRQ-003, P-E-001):
# All third-party Actions are pinned to full commit SHAs, not mutable tags.
# This prevents a compromised Action tag from injecting malicious code into
# the pipeline. SHA pinning is verified on every run.
# =============================================================================

name: DevSecOps Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Least-privilege token scope — implements SRQ-005 / STRIDE P-E-001
# Write permissions are not granted at workflow level. Only contents:read
# is needed for checkout. Actions that need write scope declare it at job level.
permissions:
  contents: read

# Cancel in-progress runs on the same branch to prevent resource exhaustion
# Mitigates STRIDE P-D-001 (ZAP runner exhaustion scenario)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Job 1: SAST — Static Application Security Testing
  # Tools: Semgrep (pattern-based) + Bandit (Python AST-aware)
  # Why both: Semgrep catches structural patterns; Bandit catches Python
  # semantic issues regardless of variable naming. Complementary coverage.
  # ---------------------------------------------------------------------------
  sast:
    name: "SAST — Semgrep + Bandit"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      # actions/checkout pinned to SHA — supply chain attack mitigation (SRQ-003)
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        # v4.2.2 — https://github.com/actions/checkout/releases/tag/v4.2.2
        with:
          # Fetch full history for Trufflehog git history scanning (SRQ-004)
          fetch-depth: 0

      - name: Set up Python 3.10
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        # v5.3.0 — https://github.com/actions/setup-python/releases/tag/v5.3.0
        with:
          python-version: "3.10"

      - name: Install SAST dependencies
        run: |
          pip install semgrep bandit

      # --- Semgrep ---
      # Runs custom rules + OWASP ruleset
      # --json outputs machine-readable results for normalize.py
      # --error exits non-zero on findings (informational here; gate is in policy job)
      - name: Run Semgrep (custom rules)
        id: semgrep_custom
        run: |
          semgrep \
            --config pipeline/sast/semgrep-rules.yml \
            --json \
            --output outputs/semgrep-custom-raw.json \
            app/
        continue-on-error: true

      - name: Run Semgrep (OWASP ruleset)
        id: semgrep_owasp
        run: |
          semgrep \
            --config p/owasp-top-ten \
            --json \
            --output outputs/semgrep-owasp-raw.json \
            app/
        continue-on-error: true

      # --- Bandit ---
      # -r recursive, -f json for machine-readable output
      # exit code 1 on findings — continue-on-error so pipeline doesn't
      # stop here; the policy gate job makes the final pass/fail decision
      - name: Run Bandit
        id: bandit
        run: |
          mkdir -p outputs
          bandit \
            -c pipeline/sast/bandit-config.yaml \
            -r app/ \
            -f json \
            -o outputs/bandit-raw.json
        continue-on-error: true

      # --- Normalize ---
      # Merges Semgrep + Bandit output into unified schema
      # This is the contract all downstream steps depend on
      - name: Normalize SAST outputs
        run: |
          python3 pipeline/sast/normalize.py \
            --semgrep outputs/semgrep-custom-raw.json \
            --bandit  outputs/bandit-raw.json \
            --output  outputs/sast-normalized.json

      # Upload raw + normalized outputs as workflow artifacts
      # Implements SRQ-004 audit trail — every run produces downloadable evidence
      # Note: raw JSON is uploaded as artifact, NOT logged to console (SRQ P-I-001)
      - name: Upload SAST artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        # v4.6.0 — https://github.com/actions/upload-artifact/releases/tag/v4.6.0
        if: always()
        with:
          name: sast-results
          path: |
            outputs/semgrep-custom-raw.json
            outputs/semgrep-owasp-raw.json
            outputs/bandit-raw.json
            outputs/sast-normalized.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Secrets Detection — Trufflehog full git history scan
  # Why Trufflehog over GitLeaks: Trufflehog scans the full git commit history,
  # not just the working tree. A developer who commits a secret and removes it
  # in the next commit believes they are safe — they are not. The secret lives
  # in git history and is exposed to anyone who can clone the repo.
  # This maps directly to SRQ-004 and STRIDE threat P-R-001.
  # ---------------------------------------------------------------------------
  secrets-detection:
    name: "Secrets — Trufflehog"
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository (full history)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      # Install Trufflehog via official install script
      - name: Install Trufflehog
        run: |
          curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh \
            | sudo sh -s -- -b /usr/local/bin

      # Scan full git history — --results=verified,unknown includes unverified
      # findings which is correct for a CI gate (flag for human review)
      # --no-update prevents auto-updater from failing due to permission issues
      - name: Run Trufflehog (full git history)
        id: trufflehog
        run: |
          mkdir -p outputs
          trufflehog git file://. \
            --no-update \
            --config pipeline/secrets/trufflehog-config.yml \
            --results=verified,unknown \
            --json \
            > outputs/trufflehog-raw.json 2>&1 || true
          echo "Trufflehog scan complete"
          cat outputs/trufflehog-raw.json

      - name: Upload secrets detection artifacts
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08
        if: always()
        with:
          name: secrets-results
          path: outputs/trufflehog-raw.json
          retention-days: 30
