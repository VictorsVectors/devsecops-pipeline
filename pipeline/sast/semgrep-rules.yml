rules:

  # -----------------------------------------------------------------------
  # CUSTOM RULE 1: Tainted SQL Injection via string formatting
  # Targets the exact pattern in /search route of app.py where
  # search_term from request.json is interpolated into a raw SQL string.
  # Maps to: SRQ-006, STRIDE A-T-001, MITRE ATT&CK T1190, OWASP A03:2021
  # Detected in: app/app.py - search_customer() function
  # -----------------------------------------------------------------------
  - id: flask-sqli-string-format
    languages: [python]
    severity: ERROR
    metadata:
      confidence: HIGH
      cwe: "CWE-89: Improper Neutralization of Special Elements used in an SQL Command"
      owasp: "A03:2021 - Injection"
      mitre_attack: "T1190 - Exploit Public-Facing Application"
      srq: "SRQ-006"
    message: >
      SQL Injection: User-controlled input from '$SOURCE' is interpolated
      directly into a SQL query string using '%s' formatting. An attacker
      can inject arbitrary SQL to dump, modify, or delete database contents.
      Use parameterized queries (SQLAlchemy ORM) instead.
    patterns:
      - pattern-inside: |
          @app.route(...)
          def $FUNC(...):
            ...
      - pattern: |
          $QUERY = $PREFIX % $INPUT
      - metavariable-regex:
          metavariable: $PREFIX
          regex: '.*SELECT.*WHERE.*'
      - pattern-inside: |
          $INPUT = $REQUEST[...]
          ...

  # -----------------------------------------------------------------------
  # CUSTOM RULE 2: Insecure pickle deserialization of request body
  # Targets the /api/deserialize route where pickle.loads() is called
  # directly on request.data with no validation.
  # Maps to: SRQ-007, STRIDE A-T-002, MITRE ATT&CK T1059.006, OWASP A08:2021
  # Detected in: app/app.py - deserialize() function
  # -----------------------------------------------------------------------
  - id: flask-pickle-loads-request-data
    languages: [python]
    severity: ERROR
    metadata:
      confidence: HIGH
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021 - Software and Data Integrity Failures"
      mitre_attack: "T1059.006 - Command and Scripting Interpreter: Python"
      srq: "SRQ-007"
    message: >
      Insecure Deserialization: 'pickle.loads()' is called on '$DATA' which
      is derived from the HTTP request body. An attacker can craft a malicious
      pickle payload to achieve Remote Code Execution (RCE). Replace pickle
      with JSON deserialization for untrusted input.
    patterns:
      - pattern-inside: |
          @app.route(...)
          def $FUNC(...):
            ...
      - pattern: |
          $DATA = request.data
          ...
          pickle.loads($DATA)

  # -----------------------------------------------------------------------
  # CUSTOM RULE 3: JWT signature verification disabled
  # Targets insecure_verify() which calls jwt.decode() with verify=False,
  # accepting any token including forged ones without signature check.
  # Maps to: SRQ-006, STRIDE A-S-001, MITRE ATT&CK T1078, OWASP A07:2021
  # Detected in: app/app.py - insecure_verify() function
  # -----------------------------------------------------------------------
  - id: flask-jwt-verify-disabled
    languages: [python]
    severity: ERROR
    metadata:
      confidence: HIGH
      cwe: "CWE-347: Improper Verification of Cryptographic Signature"
      owasp: "A07:2021 - Identification and Authentication Failures"
      mitre_attack: "T1078 - Valid Accounts"
      srq: "SRQ-006"
    message: >
      Broken Authentication: jwt.decode() is called with 'verify=False',
      disabling cryptographic signature verification entirely. Any token,
      including attacker-forged tokens, will be accepted as valid.
      Remove the verify=False argument and always validate signatures.
    pattern: jwt.decode($TOKEN, verify=False)

  # -----------------------------------------------------------------------
  # CUSTOM RULE 4: Server-Side Template Injection via request.url
  # Targets the 404 error handler and search error handler where
  # request.url / exception strings are injected into render_template_string()
  # without sanitization, enabling Jinja2 SSTI.
  # Maps to: SRQ-006, STRIDE A-I-002, OWASP A05:2021
  # Detected in: app/app.py - pnf() and search_customer() error handlers
  # -----------------------------------------------------------------------
  - id: flask-ssti-render-template-string
    languages: [python]
    severity: ERROR
    metadata:
      confidence: HIGH
      cwe: "CWE-94: Improper Control of Generation of Code"
      owasp: "A05:2021 - Security Misconfiguration"
      mitre_attack: "T1059.006 - Command and Scripting Interpreter: Python"
      srq: "SRQ-006"
    message: >
      Server-Side Template Injection (SSTI): '$TEMPLATE' is built by
      interpolating user-controlled data (request.url or exception message)
      directly into a string passed to render_template_string(). An attacker
      can inject Jinja2 expressions (e.g. {{7*7}}) to execute arbitrary
      Python code on the server. Use render_template() with a static
      template file and pass data as context variables.
    patterns:
      - pattern: |
          $TEMPLATE = $PREFIX % $USERINPUT
          ...
          render_template_string($TEMPLATE, ...)
      - pattern-either:
          - pattern-inside: |
              $USERINPUT = request.url
              ...
          - pattern-inside: |
              $USERINPUT = str($E)
              ...

  # -----------------------------------------------------------------------
  # CUSTOM RULE 5: Unsafe YAML deserialization (yaml.load without Loader)
  # Targets yaml_hammer() which calls yaml.load(y) without specifying
  # Loader=yaml.SafeLoader, allowing arbitrary Python object instantiation.
  # Maps to: SRQ-007, STRIDE A-T-002, OWASP A08:2021
  # Detected in: app/app.py - yaml_hammer() function
  # -----------------------------------------------------------------------
  - id: flask-yaml-load-unsafe
    languages: [python]
    severity: WARNING
    metadata:
      confidence: HIGH
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021 - Software and Data Integrity Failures"
      mitre_attack: "T1059.006 - Command and Scripting Interpreter: Python"
      srq: "SRQ-007"
    message: >
      Unsafe YAML Deserialization: yaml.load() is called without specifying
      a safe Loader. This allows arbitrary Python objects to be instantiated
      from attacker-controlled YAML input, leading to Remote Code Execution.
      Replace with yaml.safe_load() for all untrusted input.
    pattern: yaml.load($DATA)

  # -----------------------------------------------------------------------
  # CUSTOM RULE 6: Hardcoded secret key in Flask app config
  # Targets app.secret_key and app.config['SECRET_KEY_*'] assignments
  # with string literals directly in source code.
  # Maps to: SRQ-008, STRIDE A-I-001, OWASP A02:2021
  # Detected in: app/app.py - top-level app configuration
  # -----------------------------------------------------------------------
  - id: flask-hardcoded-secret-key
    languages: [python]
    severity: ERROR
    metadata:
      confidence: HIGH
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A02:2021 - Cryptographic Failures"
      mitre_attack: "T1552.001 - Credentials In Files"
      srq: "SRQ-008"
    message: >
      Hardcoded Secret: '$KEY' is assigned a string literal directly in
      source code. If this repository is public or the image is pushed to
      a registry, the secret is exposed. Inject all secrets via environment
      variables at runtime using os.environ.get().
    pattern-either:
      - pattern: app.secret_key = "..."
      - pattern: app.secret_key = '...'
      - pattern: app.config[$KEY] = "..."
      - pattern: app.config[$KEY] = '...'
