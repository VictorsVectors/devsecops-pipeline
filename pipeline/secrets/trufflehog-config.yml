# =============================================================================
# Trufflehog Secrets Detection Configuration
# Project: Automated SDLC Security Scanner (DevSecOps Pipeline)
# Maps to: SRQ-004 (Git History Secret Detection), SRQ-008 (Runtime Secret
#          Elimination), STRIDE P-R-001, A-I-001, MITRE ATT&CK T1552.001
#
# Why Trufflehog over GitLeaks?
# GitLeaks scans the working tree surface only — it catches secrets in the
# current commit. Trufflehog scans the FULL git history by default, including
# commits where a secret was added and then deleted in a later commit.
# This matters because a developer who commits an AWS key and removes it in
# the next commit believes they are safe. They are not — the key lives in
# git history forever and is exposed to anyone who can clone the repo.
# This distinction maps directly to SRQ-004 and is the core narrative of
# the Trufflehog demo in this project (see: git commit "add debug aws config
# for local testing" followed by "remove debug config").
# =============================================================================

# Run once and exit (appropriate for CI pipeline use)
runOnce: true

# Number of concurrent detector goroutines
concurrency: 4

# Source configuration — scan the local git repository
sources:
  - name: devsecops-pipeline-git
    type: SOURCE_TYPE_GIT
    connection:
      '@type': type.googleapis.com/sources.Git
      # Scan the local repository — path resolved at runtime in GitHub Actions
      # as: git file://${{ github.workspace }}
      unauthenticated: {}
      repositories:
        - file:///workspace
      # Do not skip binaries — secrets can be embedded in binary files too
      skipBinaries: false

# =============================================================================
# DETECTOR CONFIGURATION
# Trufflehog ships with 800+ built-in detectors covering all major secret
# types. We rely on the built-in detectors rather than defining custom ones,
# because the planted credentials use real-format AWS key patterns that the
# built-in AWS detector is specifically tuned to catch.
#
# Key detectors active for this project:
#   - AWS (AKIAIOSFODNN7EXAMPLE format) — catches planted DEBUG_AWS_KEY
#   - Generic High Entropy — catches app.config['SECRET_KEY_HMAC'] values
#   - PyPI tokens, GitHub tokens, JWT secrets (broad coverage)
# =============================================================================

