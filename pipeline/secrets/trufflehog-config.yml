# =============================================================================
# Trufflehog Custom Detector Configuration
# Project: Automated SDLC Security Scanner (DevSecOps Pipeline)
# Maps to: SRQ-004 (Git History Secret Detection), SRQ-008 (Runtime Secret
#          Elimination), STRIDE P-R-001, A-I-001, MITRE ATT&CK T1552.001
#
# Why Trufflehog over GitLeaks?
# GitLeaks scans the working tree surface only — it catches secrets in the
# current commit. Trufflehog scans the FULL git history by default, including
# commits where a secret was added and then deleted in a later commit.
# This matters because a developer who commits an AWS key and removes it in
# the next commit believes they are safe. They are not — the key lives in
# git history forever and is exposed to anyone who can clone the repo.
# This distinction maps directly to SRQ-004 and is the core narrative of
# the Trufflehog demo in this project.
#
# Note: runOnce, concurrency, and sources are Enterprise daemon fields.
# For open-source CLI use, only the detectors block is valid with --config.
# All scan behavior is controlled via CLI flags in the GitHub Actions workflow:
#   trufflehog git file://. --no-update --results=verified,unknown --config ...
# =============================================================================

# Custom detector — matches debug credential patterns planted in git history.
# No verify endpoint = findings reported as 'unknown', flagged for human review.
# Trufflehog's 800+ built-in detectors also run automatically alongside this.
detectors:
  - name: DebugCredentialDetector
    keywords:
      - DEBUG_GITHUB_TOKEN
      - DEBUG_AWS_KEY
      - DEBUG_AWS_SECRET
    regex:
      token: '(?i)debug[_-](?:github[_-]token|aws[_-]key|aws[_-]secret)\s*=\s*["\x27]([A-Za-z0-9+/=_\-]{20,})["\x27]'
